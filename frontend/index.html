<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>FindHotel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/logofhbg.png" type="image/x-icon">
</head>

<body>

    <section class="hero">

        <!-- BACKGROUND -->
        <div class="hero-background"></div>
        <!-- LOGO -->
        <div class="logo-container">
            <a href="http://127.0.0.1:5500/frontend/index.html"><img src="images/logofhbg.png" alt="FindHotel Logo"></a>
        </div>

        <!-- AUTH BUTTONS -->

        <div class="auth-buttons">

            <button class="login-btn">Entrar</button>

            <button class="signup-btn">Cadastrar</button>

        </div>

        <!-- SEARCH -->
        <div class="search-container">

            <input 
                type="text"
                id="searchInput"
                placeholder="Buscar cidade ou hotel..."
                autocomplete="off"
            >

            <svg 
                class="search-icon"
                xmlns="http://www.w3.org/2000/svg" 
                viewBox="0 0 24 24" 
                width="20" 
                height="20"
                fill="none"
                stroke="#666"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round">

                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>

            </svg>


        </div>


        <!-- CAROUSEL DE HOTÉIS -->
        <div class="carousel-container">

            <button class="arrow left">❮</button>

            <div class="cards-wrapper" id="hotelCards">

                

            </div>

            <button class="arrow right">❯</button>

        </div>


        <!-- DOTS -->
        <div class="dots-container" id="dots"></div>

    </section>

    <div class="search-overlay" id="searchOverlay"></div>



    <script src="js/api.js"></script>
    <script src="js/carousel.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/renderHotels.js"></script>
    <script src="js/search.js"></script>


</body>

</html>
